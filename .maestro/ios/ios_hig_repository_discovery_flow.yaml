appId: cn.com.fenrir-inc.gsync.dev
---
- launchApp:
    clearState: true
- assertVisible:
    id: directory_sync_screen
- tapOn:
    text: "设置"
- extendedWaitUntil:
    visible:
      id: token_settings_screen
    timeout: 10000
- tapOn:
    id: start_device_flow_button
- extendedWaitUntil:
    visible:
      id: saved_token_status_text
    timeout: 10000
- tapOn:
    id: token_settings_back_button
- extendedWaitUntil:
    visible:
      id: repository_search_field
    timeout: 10000
- tapOn:
    id: repository_search_field
- inputText: fixture
- scrollUntilVisible:
    element:
      id: repository_search_result_summary_text
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: repository_search_result_summary_text
- assertVisible:
    id: repository_option_gitsync_fixture
- eraseText
- inputText: no-match
- scrollUntilVisible:
    element:
      id: repository_search_empty_text
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: repository_search_empty_text

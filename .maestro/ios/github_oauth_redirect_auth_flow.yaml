appId: cn.com.fenrir-inc.iosAppTest.dev
---
- launchApp:
    clearState: true
- tapOn:
    text: 取消
    optional: true
- assertVisible:
    id: directory_sync_screen
- tapOn:
    id: token_settings_button
- extendedWaitUntil:
    visible:
      id: token_settings_screen
    timeout: 10000
- tapOn:
    id: start_oauth_redirect_button
- assertVisible:
    id: oauth_redirect_url_text
- openLink: gitsync-dev://oauth/github/callback?code=fixture-code&state=fixture-state
- tapOn:
    text: 打开
    optional: true
- extendedWaitUntil:
    visible:
      id: saved_token_status_text
    timeout: 10000
- assertVisible:
    id: oauth_callback_status_text
- tapOn:
    id: token_settings_back_button
- extendedWaitUntil:
    visible:
      id: directory_token_status_text
    timeout: 10000

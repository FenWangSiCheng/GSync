# New UI targets introduced by the "github-repository-picker-sync" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  repository_list_status_text:
    role: text
    label: GitHub repository list status
    semantics_identifier: repository_list_status_text
  repository_option_gitsync_fixture:
    role: button
    label: GitSync fixture repository option
    semantics_identifier: repository_option_gitsync_fixture
  branch_option_main:
    role: button
    label: Main branch option
    semantics_identifier: branch_option_main

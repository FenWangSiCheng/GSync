spec: github-repository-picker-sync
feature: feat-github-repository-picker-sync
goal: 'Authorized users can choose a GitHub repository and branch before syncing, without typing a repository URL.'
preconditions:
  - Run the dev flavor.
  - Dev GitHub authorization fixture saves test-token.
  - Dev repository catalog fixture returns deterministic repositories and branches.
acceptance:
  - id: ui-select-repository-and-branch
    claim: 'The sync screen shows repositories after authorization, lets the user choose a repository and branch, tap Sync, and see a success state.'
    kind: maestro
    flow: github_repository_picker_sync_flow
  - id: logic-fetch-repositories
    claim: 'The GitHub catalog API fetches authenticated repositories and maps owner, name, visibility, default branch, and URL fields.'
    kind: test
    file: test/features/directory_git_sync/data/datasources/github_repository_catalog_api_test.dart
  - id: logic-fetch-branches
    claim: 'The GitHub catalog API fetches repository branches and maps branch names.'
    kind: test
    file: test/features/directory_git_sync/data/datasources/github_repository_catalog_api_test.dart
  - id: logic-picker-sync-request
    claim: 'The directory sync BLoC builds sync requests from the selected repository and branch instead of a typed remote URL.'
    kind: test
    file: test/features/directory_git_sync/presentation/bloc/directory_sync_bloc_test.dart
  - id: logic-real-catalog-di
    claim: 'Dependency injection uses the fixture catalog in dev and the GitHub API catalog outside dev fixtures.'
    kind: test
    file: test/core/injection/injection_test.dart

# New UI targets introduced by the "ios-hig-repository-discovery" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  repository_search_field:
    role: text_field
    label: Search GitHub repositories
    semantics_identifier: repository_search_field
  repository_search_result_summary_text:
    role: text
    label: Repository search result count
    semantics_identifier: repository_search_result_summary_text
  repository_search_empty_text:
    role: text
    label: No repository search results
    semantics_identifier: repository_search_empty_text

# New UI targets introduced by the "github-device-flow-auth" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  start_device_flow_button:
    role: button
    label: Start GitHub Device Flow
    semantics_identifier: start_device_flow_button
  device_flow_code_text:
    role: text
    label: GitHub Device Flow user code
    semantics_identifier: device_flow_code_text
  device_flow_verification_url_text:
    role: text
    label: GitHub Device Flow verification URL
    semantics_identifier: device_flow_verification_url_text

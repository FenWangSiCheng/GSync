spec: github-device-flow-auth
feature: feat-github-device-flow-auth
goal: 'User can authorize GitHub through OAuth Device Flow without pasting a personal access token.'
preconditions:
  - Run the dev flavor.
  - Dev fixture Device Flow displays ABCD-1234 and saves a fixture token without contacting GitHub.
acceptance:
  - id: ui-device-flow-auth
    claim: 'The user opens settings, starts GitHub Device Flow, sees the verification code and URL, waits for the app to save the token, then returns to the sync screen with authorization configured.'
    kind: maestro
    flow: github_device_flow_auth_flow
  - id: logic-device-code-request
    claim: 'The GitHub Device Flow API requests a device code with client_id and scope, parses the user code, verification URI, expiry, and polling interval, and does not send a client secret.'
    kind: test
    file: test/features/token_settings/data/datasources/github_device_flow_api_test.dart
  - id: logic-device-token-polling
    claim: 'The GitHub Device Flow API maps authorization_pending, slow_down, expired_token, access_denied, success, and readable failure responses.'
    kind: test
    file: test/features/token_settings/data/datasources/github_device_flow_api_test.dart
  - id: logic-device-flow-bloc
    claim: 'The token settings BLoC displays the device code, polls until authorization succeeds, stores the returned token securely, and reports missing client ID failures.'
    kind: test
    file: test/features/token_settings/presentation/bloc/token_settings_bloc_test.dart
  - id: logic-device-flow-di
    claim: 'Dependency injection uses the deterministic Device Flow fixture in dev and the GitHub API-backed Device Flow repository outside dev.'
    kind: test
    file: test/core/injection/injection_test.dart

spec: ios-clean-ui
feature: feat-ios-clean-ui
goal: 'The directory sync screen is restyled to a clean iOS aesthetic with Simplified Chinese copy and the sync happy path still works end to end.'
preconditions:
  - Run the dev flavor.
  - Dev default sync directory is available.
  - Dev fixture repository and branch are available after authorization.
  - Dev fixture credential test-token is accepted without a real account.
acceptance:
  - id: ui-ios-clean-happy-path
    claim: 'A user can open the restyled iOS-clean screen, use the default directory, save Git credentials, tap Sync, and see a success state.'
    kind: maestro
    flow: ios_clean_ui_flow

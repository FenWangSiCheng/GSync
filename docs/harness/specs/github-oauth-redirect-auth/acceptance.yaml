spec: github-oauth-redirect-auth
feature: feat-github-oauth-redirect-auth
goal: 'User can authorize GitHub through browser OAuth redirect and return to GitSync with a securely saved token.'
preconditions:
  - Run the dev flavor.
  - Dev redirect-auth fixture validates state and saves a fixture token without contacting GitHub.
acceptance:
  - id: ui-oauth-redirect-auth
    claim: 'The user opens settings, starts GitHub browser authorization, returns through the OAuth callback, and sees GitHub authorization configured on the sync screen.'
    kind: maestro
    flow: github_oauth_redirect_auth_flow
  - id: logic-oauth-url-pkce
    claim: 'The OAuth redirect repository builds a GitHub authorize URL with client_id, redirect_uri, scope, state, code_challenge, and code_challenge_method=S256.'
    kind: test
    file: test/features/token_settings/data/repositories/github_oauth_redirect_repository_test.dart
  - id: logic-oauth-callback-exchange
    claim: 'The OAuth redirect repository validates callback state, maps callback errors, and exchanges code with client_id, redirect_uri, and code_verifier without requiring a client secret.'
    kind: test
    file: test/features/token_settings/data/repositories/github_oauth_redirect_repository_test.dart
  - id: logic-oauth-redirect-bloc
    claim: 'The token settings BLoC starts browser authorization, handles callback success/failure, stores the returned token securely, and reports missing configuration failures.'
    kind: test
    file: test/features/token_settings/presentation/bloc/token_settings_bloc_test.dart
  - id: logic-oauth-redirect-config
    claim: 'AppConfig exposes OAuth redirect configuration and dependency injection uses the deterministic fixture in dev and the GitHub API-backed redirect repository outside dev.'
    kind: test
    file: test/core/injection/injection_test.dart

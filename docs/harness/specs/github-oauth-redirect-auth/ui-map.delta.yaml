# New UI targets introduced by the "github-oauth-redirect-auth" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  start_oauth_redirect_button:
    role: button
    label: Start GitHub OAuth redirect authorization
    semantics_identifier: start_oauth_redirect_button
  oauth_redirect_url_text:
    role: text
    label: GitHub OAuth authorization URL
    semantics_identifier: oauth_redirect_url_text
  oauth_callback_status_text:
    role: text
    label: GitHub OAuth callback status
    semantics_identifier: oauth_callback_status_text

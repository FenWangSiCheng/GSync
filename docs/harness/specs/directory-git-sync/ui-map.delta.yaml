# New UI targets introduced by the "directory-git-sync" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  directory_sync_screen:
    role: screen
    label: Directory sync
    semantics_identifier: directory_sync_screen
  directory_picker_button:
    role: button
    label: Choose directory
    semantics_identifier: directory_picker_button
  directory_fixture_option:
    role: button
    label: GitSync Fixture Notes
    semantics_identifier: directory_fixture_option
  selected_directory_text:
    role: text
    label: Selected directory
    semantics_identifier: selected_directory_text
  remote_url_field:
    role: textField
    label: Remote Git repository URL
    semantics_identifier: remote_url_field
  auth_token_field:
    role: textField
    label: Authentication token
    semantics_identifier: auth_token_field
  sync_button:
    role: button
    label: Sync
    semantics_identifier: sync_button
  sync_status_text:
    role: text
    label: Sync status
    semantics_identifier: sync_status_text
  sync_success_text:
    role: text
    label: Sync succeeded
    semantics_identifier: sync_success_text
  sync_error_text:
    role: text
    label: Sync failed
    semantics_identifier: sync_error_text

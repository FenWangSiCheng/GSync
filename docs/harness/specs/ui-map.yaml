targets:
  main_tab.home:
    kind: navigation_tab
    text: Home
    semantics_identifier: main_tab.home
    description: Bottom navigation tab that shows the home page.
  main_tab.user:
    kind: navigation_tab
    text: User
    semantics_identifier: main_tab.user
    description: Bottom navigation tab that shows the user profile page.
  home.counter.value:
    kind: text
    semantics_identifier: home.counter.value
    description: Current step count label, e.g. "Steps: 0".
  home.counter.increment:
    kind: button
    text: "+1"
    semantics_identifier: home.counter.increment
    description: Increments the step counter by one.
  home.counter.reset:
    kind: button
    text: Reset
    semantics_identifier: home.counter.reset
    description: Resets the step counter to zero.
  user.page:
    kind: page
    semantics_identifier: user.page
    description: User profile page root.
  user.name:
    kind: text
    semantics_identifier: user.name
    description: Loaded user's display name row.
  user.email:
    kind: text
    semantics_identifier: user.email
    description: Loaded user's email row.
  user.load_user_1:
    kind: button
    text: User 1
    semantics_identifier: user.load_user_1
    description: Loads mock user 1.
  user.load_user_2:
    kind: button
    text: User 2
    semantics_identifier: user.load_user_2
    description: Loads mock user 2.
  user.load_user_3:
    kind: button
    text: User 3
    semantics_identifier: user.load_user_3
    description: Loads mock user 3.

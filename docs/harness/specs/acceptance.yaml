# Acceptance checklist for the user-profile-flow spec.
#
# Each criterion maps a human-readable claim to an executable evidence source:
#   - kind: maestro  -> verified by running the referenced Maestro flow
#   - kind: test     -> verified by a non-UI logic, data, or business unit test
#
# `harness spec accept user-profile-flow` reads this file, runs the evidence
# sources, and writes a pass/fail report to build/harness/evidence/<id>/report.json.
# Maestro criteria are skipped by default; pass --maestro to run them on a
# booted simulator or device.
#
# Do not invent selectors. Every target must exist in ui-map.yaml or the spec.

spec: user-profile-flow
feature: feat-008
goal: Verify that a user can open the user profile page and switch between mock users.
preconditions:
  - Run the dev flavor with mock users from assets/mock/users.json.
acceptance:
  - id: a1
    claim: Home page is visible after launch.
    kind: maestro
    flow: user_profile_flow
    platform: any
  - id: a2
    claim: Tapping the User tab opens the User Info page.
    kind: maestro
    flow: user_profile_flow
    platform: any
  - id: a3
    claim: "Switching to User 2 shows Name: Jane Smith and her email."
    kind: maestro
    flow: user_profile_flow
    platform: any
  - id: a4
    claim: "Switching to User 3 shows Name: 张三 and zhangsan@example.com."
    kind: maestro
    flow: user_profile_flow
    platform: any

spec: github-repository-download-sync
feature: feat-github-repository-download-sync
goal: 'User can sync a GitHub repository or repository subdirectory down to the selected local device directory.'
preconditions:
  - Run the dev flavor.
  - Dev fixture repository and branch are available after authorization.
  - Dev fixture credential test-token is accepted without a real account.
acceptance:
  - id: ui-download-sync-path
    claim: 'The sync screen shows a readable selected directory, lets the user authorize GitHub, choose a fixture repository and branch, tap Sync, and see a success state in the dev fixture flow.'
    kind: maestro
    flow: github_repository_download_sync_flow
  - id: logic-download-remote-files
    claim: 'The GitHub API sync repository recursively reads remote GitHub contents and writes downloaded files into the selected local directory.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
  - id: logic-empty-remote-directory
    claim: 'An empty remote GitHub directory returns a no-changes sync result instead of a misleading upload success.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
  - id: logic-readable-api-failures
    claim: 'GitHub target parsing, authentication, and API failures produce readable sync failure messages without exposing the saved token.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
  - id: logic-real-sync-uses-github-api
    claim: 'Dependency injection uses the GitHub API sync repository outside dev fixtures so mobile builds do not execute system git processes.'
    kind: test
    file: test/core/injection/injection_test.dart

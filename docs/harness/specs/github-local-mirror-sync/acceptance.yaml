spec: github-local-mirror-sync
feature: feat-github-local-mirror-sync
goal: 'The selected local directory becomes an exact mirror of the selected GitHub repository path after Sync succeeds.'
preconditions:
  - Run the dev flavor.
  - Complete the deterministic GitHub Device Flow fixture.
  - Select the deterministic fixture repository and main branch.
acceptance:
  - id: ui-complete-local-mirror
    claim: 'The authorized user can select the fixture repository and branch, tap Sync, and see the completed mirror success state.'
    kind: maestro
    flow: github_local_mirror_sync_flow
  - id: logic-remove-local-residual-entries
    claim: 'After every remote file is read, the GitHub API sync repository removes local files, links, and directories absent from the remote tree.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
  - id: logic-resolve-local-type-collisions
    claim: 'The remote file tree wins when a local file conflicts with a remote directory or a local directory conflicts with a remote file.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
  - id: logic-preserve-local-residuals-on-remote-failure
    claim: 'A failed remote listing or file download does not start local cleanup, preserving local-only entries.'
    kind: test
    file: test/features/directory_git_sync/data/repositories/github_api_git_sync_repository_test.dart
# Add kind: test criteria only for non-UI logic, data, BLoC, repository, or
# harness unit tests. UI behavior belongs in the Maestro flow above.
